version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/drivemate
      - PORT=8080
      - JWT_SECRET=drivemate_secure_jwt_secret_998877
    depends_on:
      - mongo
    volumes:
      - ./logs:/usr/src/app/logs
      - ../uploads:/usr/src/uploads

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
