<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login - DriveMate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <a href="index.html" class="logo">Drive<span>Mate</span></a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="owner-login.html">Owner Portal</a>
                <a href="worker-login.html">Worker Portal</a>
            </nav>
        </div>
    </header>

    <!-- Auth Page -->
    <section class="auth-page">
        <div class="auth-card">
            <!-- Login Form -->
            <div id="login-section">
                <h2>Owner Login</h2>
                <p class="subtitle">Login to manage your vehicles and find workers</p>
                
                <form id="owner-login-form">
                    <div class="form-group">
                        <label for="ownerPhone">Phone Number</label>
                        <input type="tel" id="ownerPhone" name="ownerPhone" placeholder="Enter your phone number" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Login</button>
                </form>
                
                <div class="auth-links">
                    <p>New owner? <a href="#" onclick="showRegister()">Register here</a></p>
                    <p style="margin-top: 10px;"><a href="index.html">Back to Home</a></p>
                </div>
            </div>
            
            <!-- Register Form -->
            <div id="register-section" style="display: none;">
                <h2>Register as Owner</h2>
                <p class="subtitle">Create your owner account</p>
                
                <form id="owner-register-form">
                    <div class="form-group">
                        <label for="ownerName">Owner/Business Name</label>
                        <input type="text" id="ownerName" name="ownerName" placeholder="Enter your name or business name" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="ownerPhoneReg">Phone Number</label>
                            <input type="tel" id="ownerPhoneReg" name="ownerPhone" placeholder="10-digit mobile number" required>
                        </div>
                        <div class="form-group">
                            <label for="ownerCity">City</label>
                            <input type="text" id="ownerCity" name="ownerCity" placeholder="Your city" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="ownerPhoto">Profile Photo (Optional)</label>
                        <input type="file" id="ownerPhoto" name="ownerPhoto" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Register</button>
                </form>
                
                <div class="auth-links">
                    <p>Already registered? <a href="#" onclick="showLogin()">Login here</a></p>
                    <p style="margin-top: 10px;"><a href="index.html">Back to Home</a></p>
                </div>
            </div>
            
            <!-- Alert Container -->
            <div id="auth-message" style="margin-top: 20px;"></div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
        function showRegister() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }
    </script>
</body>
</html>
