<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Login - DriveMate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <a href="index.html" class="logo">Drive<span>Mate</span></a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="owner-login.html">Owner Portal</a>
                <a href="worker-login.html">Worker Portal</a>
            </nav>
        </div>
    </header>

    <!-- Auth Page -->
    <section class="auth-page">
        <div class="auth-card">
            <!-- Login Form -->
            <div id="login-section">
                <h2>Worker Login</h2>
                <p class="subtitle">Login to find work opportunities</p>
                
                <form id="worker-login-form">
                    <div class="form-group">
                        <label for="workerPhone">Phone Number</label>
                        <input type="tel" id="workerPhone" name="workerPhone" placeholder="Enter your phone number" required>
                    </div>
                    <button type="submit" class="btn btn-secondary btn-full">Login</button>
                </form>
                
                <div class="auth-links">
                    <p>New worker? <a href="#" onclick="showRegister()">Register here</a></p>
                    <p style="margin-top: 10px;"><a href="index.html">Back to Home</a></p>
                </div>
            </div>
            
            <!-- Register Form -->
            <div id="register-section" style="display: none;">
                <h2>Register as Worker</h2>
                <p class="subtitle">Create your worker profile to find jobs</p>
                
                <form id="worker-register-form">
                    <div class="form-group">
                        <label for="workerName">Full Name</label>
                        <input type="text" id="workerName" name="workerName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="workerPhoneReg">Phone Number</label>
                            <input type="tel" id="workerPhoneReg" name="workerPhone" placeholder="10-digit mobile number" required>
                        </div>
                        <div class="form-group">
                            <label for="workerLocation">Current Location</label>
                            <input type="text" id="workerLocation" name="workerLocation" placeholder="Your city" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="workerType">Work Type</label>
                            <select id="workerType" name="workerType" required>
                                <option value="">Select work type</option>
                                <option value="driver">Driver</option>
                                <option value="helper">Helper</option>
                                <option value="loader">Loader</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="workerExperience">Experience (Years)</label>
                            <input type="number" id="workerExperience" name="workerExperience" min="0" max="50" placeholder="Years" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="workerPhoto">Profile Photo (Optional)</label>
                        <input type="file" id="workerPhoto" name="workerPhoto" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-secondary btn-full">Register</button>
                </form>
                
                <div class="auth-links">
                    <p>Already registered? <a href="#" onclick="showLogin()">Login here</a></p>
                    <p style="margin-top: 10px;"><a href="index.html">Back to Home</a></p>
                </div>
            </div>
            
            <!-- Alert Container -->
            <div id="auth-message" style="margin-top: 20px;"></div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
        function showRegister() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }
    </script>
</body>
</html>
